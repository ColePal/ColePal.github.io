<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AAC 77 Symbol Core Board</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 12px;
    }

    h1 { color: #fff; font-size: 1.3rem; letter-spacing: 0.02em; }

    #board {
      display: grid;
      grid-template-columns: repeat(11, 1fr);
      gap: 4px;
      width: 100%;
      max-width: 960px;
    }

    .cell {
      padding: 8px 4px;
      border: none;
      border-radius: 6px;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.2;
      word-break: break-word;
      transition: transform 0.1s ease, opacity 0.3s ease, box-shadow 0.3s ease;
    }

    .cell:hover  { filter: brightness(1.12); }
    .cell:active { transform: scale(0.9); }

    .cat-pink   { background: #D81B60; color: #fff; }
    .cat-orange { background: #F57C00; color: #fff; }
    .cat-yellow { background: #FDD835; color: #111; }
    .cat-green  { background: #388E3C; color: #fff; }
    .cat-blue   { background: #1565C0; color: #fff; }
    .cat-white  { background: #ECEFF1; color: #222; }

    body.onboarding .cell            { opacity: 0.2; pointer-events: none; }
    body.onboarding .cell.highlighted { opacity: 1; pointer-events: auto; animation: glow 1.4s ease-in-out infinite; }

    @keyframes glow {
      0%,100% { box-shadow: 0 0 0 3px rgba(255,255,255,0.9), 0 0 12px rgba(255,255,255,0.4); }
      50%      { box-shadow: 0 0 0 6px rgba(255,255,255,0.4), 0 0 24px rgba(255,255,255,0.15); }
    }

    #onboarding-panel {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      border-radius: 14px;
      padding: 22px 28px;
      max-width: 500px;
      width: 92%;
      box-shadow: 0 12px 40px rgba(0,0,0,0.55);
      z-index: 200;
      text-align: center;
    }

    #step-counter { font-size: 0.78rem; color: #999; margin-bottom: 8px; }

    #onboarding-panel h2 { font-size: 1.1rem; color: #111; margin-bottom: 10px; }

    #onboarding-panel p  { font-size: 0.92rem; color: #444; line-height: 1.6; margin-bottom: 18px; }

    #btn-next {
      background: #1565C0; color: #fff; border: none;
      padding: 11px 32px; border-radius: 8px;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
    }
    #btn-next:hover { background: #0D47A1; }

    #progress-dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 14px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; transition: background 0.2s; }
    .dot.active { background: #1565C0; }

    #legend { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: #ccc; }
    .legend-dot { width: 13px; height: 13px; border-radius: 3px; flex-shrink: 0; }

    #speech-bar { font-size: 0.9rem; color: #aaa; min-height: 1.4em; text-align: center; }
  </style>
</head>
<body class="onboarding">

  <h1>AAC 77 Symbol Core Board</h1>
  <div id="board"></div>
  <div id="speech-bar"></div>

  <div id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#D81B60"></div>Social</div>
    <div class="legend-item"><div class="legend-dot" style="background:#F57C00"></div>Questions</div>
    <div class="legend-item"><div class="legend-dot" style="background:#FDD835"></div>Pronouns</div>
    <div class="legend-item"><div class="legend-dot" style="background:#388E3C"></div>Verbs</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1565C0"></div>Descriptors</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ECEFF1"></div><span>Connectors</span></div>
  </div>

  <div id="onboarding-panel">
    <div id="step-counter"></div>
    <div id="progress-dots"></div>
    <h2 id="ob-title"></h2>
    <p  id="ob-desc"></p>
    <button id="btn-next">Next</button>
  </div>

  <script>
    const words = [
      // Row 1 — Social (pink) + Questions (orange)
      {w:"yes",cat:"pink"},{w:"no",cat:"pink"},{w:"please",cat:"pink"},
      {w:"thank you",cat:"pink"},{w:"sorry",cat:"pink"},{w:"wait",cat:"pink"},
      {w:"finished",cat:"pink"},{w:"again",cat:"pink"},
      {w:"what",cat:"orange"},{w:"where",cat:"orange"},{w:"when",cat:"orange"},
      // Row 2 — Questions + Pronouns (yellow)
      {w:"why",cat:"orange"},{w:"how",cat:"orange"},{w:"which",cat:"orange"},
      {w:"I",cat:"yellow"},{w:"you",cat:"yellow"},{w:"he",cat:"yellow"},
      {w:"she",cat:"yellow"},{w:"we",cat:"yellow"},{w:"they",cat:"yellow"},
      {w:"it",cat:"yellow"},{w:"that",cat:"yellow"},
      // Row 3 — Pronouns + Verbs (green)
      {w:"my",cat:"yellow"},{w:"your",cat:"yellow"},{w:"his",cat:"yellow"},
      {w:"her",cat:"yellow"},{w:"their",cat:"yellow"},{w:"this",cat:"yellow"},
      {w:"want",cat:"green"},{w:"need",cat:"green"},{w:"go",cat:"green"},
      {w:"get",cat:"green"},{w:"like",cat:"green"},
      // Row 4 — Verbs (green)
      {w:"feel",cat:"green"},{w:"make",cat:"green"},{w:"see",cat:"green"},
      {w:"put",cat:"green"},{w:"come",cat:"green"},{w:"look",cat:"green"},
      {w:"give",cat:"green"},{w:"tell",cat:"green"},{w:"do",cat:"green"},
      {w:"have",cat:"green"},{w:"eat",cat:"green"},
      // Row 5 — Verbs end + Descriptors (blue)
      {w:"drink",cat:"green"},{w:"help",cat:"green"},{w:"stop",cat:"green"},
      {w:"play",cat:"green"},{w:"open",cat:"green"},
      {w:"good",cat:"blue"},{w:"bad",cat:"blue"},{w:"big",cat:"blue"},
      {w:"little",cat:"blue"},{w:"more",cat:"blue"},{w:"different",cat:"blue"},
      // Row 6 — Descriptors + Connectors (white)
      {w:"same",cat:"blue"},{w:"some",cat:"blue"},{w:"all",cat:"blue"},
      {w:"hot",cat:"blue"},{w:"cold",cat:"blue"},{w:"fast",cat:"blue"},
      {w:"slow",cat:"blue"},{w:"new",cat:"blue"},
      {w:"in",cat:"white"},{w:"on",cat:"white"},{w:"up",cat:"white"},
      // Row 7 — Connectors (white)
      {w:"down",cat:"white"},{w:"out",cat:"white"},{w:"off",cat:"white"},
      {w:"with",cat:"white"},{w:"for",cat:"white"},{w:"not",cat:"white"},
      {w:"here",cat:"white"},{w:"there",cat:"white"},{w:"and",cat:"white"},
      {w:"but",cat:"white"},{w:"I don't know",cat:"white"},
    ];

    // Build grid
    const board = document.getElementById('board');
    words.forEach(({w, cat}) => {
      const btn = document.createElement('button');
      btn.className   = `cell cat-${cat}`;
      btn.dataset.cat = cat;
      btn.textContent = w;
      btn.addEventListener('click', () => speak(w, btn));
      board.appendChild(btn);
    });

    // Speech
    const speechBar = document.getElementById('speech-bar');
    function speak(word, btn) {
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(word);
      utt.rate  = 0.88;
      window.speechSynthesis.speak(utt);
      speechBar.textContent = `🔊  "${word}"`;
      btn.style.transform = 'scale(0.88)';
      setTimeout(() => (btn.style.transform = ''), 160);
    }

    // Onboarding
    const steps = [
      { title:"Welcome to the Core Board",
        desc:"This is the 77 Symbol Core Board — a communication tool that helps people who have difficulty speaking express themselves. Each coloured button represents a word. Let's take a quick tour.",
        hl:null },
      { title:"🩷 Pink — Social & Functional Words",
        desc:"Pink buttons are social and functional words: 'yes', 'no', 'please', 'thank you', 'sorry', and more. These are often the most important words in everyday communication.",
        hl:"pink" },
      { title:"🟠 Orange — Question Words",
        desc:"Orange buttons are question words: 'what', 'where', 'when', 'why', 'how', and 'which'. They let the user ask for information and start conversations.",
        hl:"orange" },
      { title:"🟡 Yellow — Pronouns",
        desc:"Yellow buttons are pronouns — 'I', 'you', 'he', 'she', 'we', 'they', 'my', 'your'. These refer to people and appear in almost every sentence.",
        hl:"yellow" },
      { title:"🟢 Green — Action Words (Verbs)",
        desc:"Green buttons are verbs — action words like 'want', 'go', 'help', 'eat', and 'play'. Verbs are the engine of communication; they let users express what they want to do.",
        hl:"green" },
      { title:"🔵 Blue — Describing Words",
        desc:"Blue buttons are descriptors — words like 'good', 'big', 'more', 'hot', and 'different'. These add detail and context to what the user wants to communicate.",
        hl:"blue" },
      { title:"⬜ White — Connector Words",
        desc:"White buttons are connector and preposition words — 'in', 'on', 'and', 'not', 'here'. These link ideas together to build more complete sentences.",
        hl:"white" },
      { title:"You're ready! 🎉",
        desc:"Now explore the board yourself. Click any button to hear it spoken aloud — just as an AAC device user would experience it.",
        hl:null },
    ];

    const dotsEl  = document.getElementById('progress-dots');
    steps.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot';
      dotsEl.appendChild(d);
    });

    let step = 0;
    const titleEl = document.getElementById('ob-title');
    const descEl  = document.getElementById('ob-desc');
    const stepEl  = document.getElementById('step-counter');
    const nextBtn = document.getElementById('btn-next');
    const panel   = document.getElementById('onboarding-panel');

    function showStep(i) {
      const s = steps[i];
      titleEl.textContent = s.title;
      descEl.textContent  = s.desc;
      stepEl.textContent  = `Step ${i + 1} of ${steps.length}`;
      nextBtn.textContent = i === steps.length - 1 ? 'Start Exploring →' : 'Next →';
      document.querySelectorAll('.dot').forEach((d, idx) => d.classList.toggle('active', idx === i));
      document.querySelectorAll('.cell').forEach(btn =>
        btn.classList.toggle('highlighted', s.hl !== null && btn.dataset.cat === s.hl)
      );
    }

    nextBtn.addEventListener('click', () => {
      step++;
      if (step >= steps.length) {
        document.body.classList.remove('onboarding');
        panel.style.display = 'none';
        document.querySelectorAll('.cell').forEach(b => b.classList.remove('highlighted'));
        speechBar.textContent = 'Click any button to hear it spoken aloud.';
        return;
      }
      showStep(step);
    });

    showStep(0);
  </script>
</body>
</html>
