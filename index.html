<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cole's Learning Modules</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; }
    h1 { color: #fff; font-size: 1.6rem; margin-bottom: 32px; }
    .modules { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
    .module-card { background: #16213e; border-radius: 12px; padding: 24px 32px; color: #fff; text-decoration: none; min-width: 220px; text-align: center; border: 1px solid #0f3460; transition: background 0.2s, transform 0.15s; }
    .module-card:hover { background: #0f3460; transform: translateY(-3px); }
    .module-card h2 { font-size: 1.05rem; margin-bottom: 8px; }
    .module-card p { font-size: 0.82rem; color: #aaa; }
  </style>
</head>
<body>
  <h1>Learning Modules</h1>
  <div class="modules">
    <a class="module-card" href="AAC Learning Modules/">
      <h2>AAC Core Board</h2>
      <p>Explore the 77 Symbol Core Board and learn how AAC devices work.</p>
    </a>
  </div>
</body>
</html>
