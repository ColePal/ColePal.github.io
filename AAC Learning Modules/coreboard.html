<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AAC Core Board</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 12px;
    }

    h1 { color: #fff; font-size: 1.2rem; letter-spacing: 0.02em; }

    #board-wrap {
      position: relative;
      width: 100%;
      max-width: 960px;
      user-select: none;
    }

    #board-img {
      display: block;
      width: 100%;
      height: auto;
    }

    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* Transparent interactive buttons */
    .cell {
      position: absolute;
      background: transparent;
      border: none;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.08s ease;
      padding: 0;
    }

    .cell:hover  { background: rgba(255,255,255,0.18); }
    .cell:active { background: rgba(255,255,0,0.30); }
    .cell.flash  { background: rgba(255,220,0,0.45); }

    /* Onboarding */
    body.onboarding .cell { pointer-events: none; }
    body.onboarding .cell.highlighted { pointer-events: auto; }

    body.onboarding #overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
      pointer-events: none;
      z-index: 1;
    }

    body.onboarding .cell.highlighted {
      z-index: 2;
      animation: glow 1.4s ease-in-out infinite;
    }

    @keyframes glow {
      0%,100% { box-shadow: 0 0 0 3px rgba(255,255,255,0.95), 0 0 14px rgba(255,255,255,0.5); background: rgba(255,255,255,0.15); }
      50%      { box-shadow: 0 0 0 6px rgba(255,255,255,0.4),  0 0 28px rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); }
    }

    /* Green-tinted glow for the action-word (green) zone so it stays visually green */
    @keyframes glow-green {
      0%,100% { box-shadow: 0 0 0 3px rgba(56,142,60,0.95), 0 0 14px rgba(56,142,60,0.55); background: rgba(56,142,60,0.28); }
      50%      { box-shadow: 0 0 0 6px rgba(56,142,60,0.45), 0 0 28px rgba(56,142,60,0.22); background: rgba(56,142,60,0.14); }
    }

    body.onboarding .cell.highlighted[data-cat="orange"],
    body.quiz        .cell.highlighted[data-cat="orange"] {
      animation: glow-green 1.4s ease-in-out infinite;
    }

    /* Free-play mode: kill every lingering animation/overlay so all cells are fully interactive */
    body.free-play .cell {
      pointer-events: auto !important;
      animation: none !important;
      box-shadow: none !important;
      background: transparent !important;
    }
    body.free-play .cell:hover  { background: rgba(255,255,255,0.18) !important; }
    body.free-play .cell:active { background: rgba(255,255,0,0.30)    !important; }
    body.free-play .cell.flash  { background: rgba(255,220,0,0.45)    !important; }

    /* Quiz mode */
    body.quiz .cell {
      pointer-events: auto;
      z-index: 2;
    }

    body.quiz .cell.highlighted {
      animation: glow 1.4s ease-in-out infinite;
    }

    body.quiz .cell.correct-flash {
      background: rgba(76,175,80,0.55) !important;
      box-shadow: 0 0 0 4px rgba(76,175,80,0.9), 0 0 20px rgba(76,175,80,0.6);
    }

    /* Onboarding panel */
    #ob-panel {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      border-radius: 14px;
      padding: 12px 20px 14px;
      max-width: 480px;
      width: 92%;
      box-shadow: 0 12px 40px rgba(0,0,0,0.55);
      z-index: 300;
      text-align: center;
    }

    #panel-toggle {
      position: absolute;
      top: 8px; right: 10px;
      background: none; border: none;
      font-size: 1rem; cursor: pointer;
      color: #aaa; line-height: 1;
      padding: 2px 4px;
    }
    #panel-toggle:hover { color: #555; }

    #panel-body { overflow: hidden; }
    #ob-panel.collapsed #panel-body { display: none; }
    #ob-panel.collapsed { padding: 10px 20px; }

    #ob-counter { font-size: 0.78rem; color: #999; margin-bottom: 8px; }

    #ob-dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 12px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; transition: background 0.2s; }
    .dot.active { background: #1565C0; }
    .dot.done   { background: #43A047; }

    #ob-panel h2 { font-size: 1.05rem; color: #111; margin-bottom: 8px; }
    #ob-panel p  { font-size: 0.9rem;  color: #444; line-height: 1.55; margin-bottom: 16px; }

    #btn-next {
      background: #1565C0; color: #fff; border: none;
      padding: 10px 28px; border-radius: 8px;
      font-size: 0.92rem; font-weight: 700; cursor: pointer;
    }
    #btn-next:hover { background: #0D47A1; }

    #quiz-feedback {
      display: none;
      margin-top: 10px;
      font-size: 0.88rem;
      padding: 8px 12px;
      border-radius: 8px;
      font-weight: 600;
    }

    #speech-bar { font-size: 0.9rem; color: #aaa; min-height: 1.4em; text-align: center; }
  </style>
</head>

<body class="onboarding">
  <div id="board-wrap">
    <img id="board-img" src="coreboard.png" alt="AAC 77 Symbol Core Board" draggable="false">
    <div id="overlay"></div>
  </div>

  <!-- Onboarding / Quiz panel -->
  <div id="ob-panel">
    <button id="panel-toggle" title="Hide panel">▼</button>
    <div id="panel-body">
      <div id="ob-counter"></div>
      <div id="ob-dots"></div>
      <h2 id="ob-title"></h2>
      <p  id="ob-desc"></p>
      <button id="btn-next">Next →</button>
      <div id="quiz-feedback"></div>
    </div>
  </div>

  <div id="speech-bar"></div>

  <script>
    // ── Image dimensions (px) ─────────────────────────────────────────────────
    const IW = 1248, IH = 909;
    const MAIN_H = 795;   // main 7-row grid height
    const COLS = 11, ROWS = 7;

    const cellW = 100 / COLS;                        // % width per col
    const cellH = (MAIN_H / IH) * (100 / ROWS);     // % height per row

    // ── Vocabulary ─────────────────────────────────────────────────────────
    // TTS text uses ", " between alternatives for natural reading
    const grid = [
      // Row 0
      ["I, me, my","it","who","what","am, is, are, be","when","be careful","all","some","that","this"],
      // Row 1
      ["he, she","we, they, us","not, don't","come","do, does, did","again","now, it's time","how","why","finish, all done","problem"],
      // Row 2
      ["you, your","drink","eat, taste","feel","get, got","late, later","ready","all gone","bad","big","clean"],
      // Row 3
      ["give, gave","go","hear, listen","help","like","where","away","cold","different","dirty","fast"],
      // Row 4
      ["look, see","make, made","open, close","play","put","here","there","good","happy","hot","little"],
      // Row 5
      ["read","say, tell","sit","stand","stop","in","out","more","sad","same","sick, sore"],
      // Row 6
      ["take","turn","wait","want","work","up","down","on","off","silly","slow"],
    ];

    // Bottom row cells (pixel x coordinates, from image analysis)
    const bottomRow = [
      { word:"yes",    x1:206,  x2:313  },
      { word:"one",    x1:324,  x2:434  },
      { word:"two",    x1:443,  x2:553  },
      { word:"three",  x1:562,  x2:672  },
      { word:"four",   x1:681,  x2:791  },
      { word:"five",   x1:800,  x2:911  },
      { word:"no",     x1:924,  x2:1030 },
      { word:"toilet", x1:1063, x2:1169 },
    ];

    // Colour categories for onboarding highlighting
    const catMap = {
      yellow: [[0,0],[0,1],[1,0],[1,1],[2,0]],
      pink:   [[0,2],[0,3],[0,5],[1,7],[1,8],[3,5]],
      orange: [[0,4],[1,3],[1,4],[2,1],[2,2],[2,3],[2,4],[3,0],[3,1],[3,2],[3,3],[3,4],[4,0],[4,1],[4,2],[4,3],[4,4],[5,0],[5,1],[5,2],[5,3],[5,4],[6,0],[6,1],[6,2],[6,3],[6,4]],
      purple: [[3,5],[3,6],[4,5],[4,6],[5,5],[5,6],[6,5],[6,6],[6,7],[6,8]],
      blue:   [[1,9],[2,7],[2,8],[2,9],[2,10],[3,7],[3,8],[3,9],[3,10],[4,7],[4,8],[4,9],[4,10],[5,7],[5,8],[5,9],[5,10],[6,9],[6,10]],
    };

    // ── Build overlay buttons ─────────────────────────────────────────────
    const overlay = document.getElementById('overlay');

    function makeBtn(word, style, cat) {
      const btn = document.createElement('button');
      btn.className = 'cell';
      if (cat) btn.dataset.cat = cat;
      Object.assign(btn.style, style);
      btn.setAttribute('aria-label', word);
      const spokenWord = word.split(',')[0].trim();
      btn.addEventListener('click', () => {
        if (quizActive) { handleQuizClick(btn); return; }
        speak(spokenWord, btn);
      });
      return btn;
    }

    // Main 7×11 grid
    grid.forEach((row, r) => {
      row.forEach((word, c) => {
        let cat = 'other';
        for (const [catName, cells] of Object.entries(catMap)) {
          if (cells.some(([cr,cc]) => cr === r && cc === c)) { cat = catName; break; }
        }
        const btn = makeBtn(word, {
          left:   `${(c * cellW).toFixed(3)}%`,
          top:    `${(r * cellH).toFixed(3)}%`,
          width:  `${cellW.toFixed(3)}%`,
          height: `${cellH.toFixed(3)}%`,
        }, cat);
        btn.dataset.row = r;
        btn.dataset.col = c;
        overlay.appendChild(btn);
      });
    });

    // Bottom row
    const btmTop = (MAIN_H / IH * 100).toFixed(3) + '%';
    const btmH   = ((IH - MAIN_H) / IH * 100).toFixed(3) + '%';
    bottomRow.forEach(({word, x1, x2}) => {
      overlay.appendChild(makeBtn(word, {
        left:   `${(x1 / IW * 100).toFixed(3)}%`,
        top:    btmTop,
        width:  `${((x2 - x1) / IW * 100).toFixed(3)}%`,
        height: btmH,
      }, 'bottom'));
    });

    // ── Speech ────────────────────────────────────────────────────────────
    const speechBar = document.getElementById('speech-bar');
    function speak(word, btn) {
      window.speechSynthesis.cancel();
      // Chrome silently pauses synthesis after ~15 s of inactivity; resume it first
      window.speechSynthesis.resume();
      const utt = new SpeechSynthesisUtterance(word);
      utt.rate = 0.88;
      window.speechSynthesis.speak(utt);
      if (speechBar) speechBar.textContent = `🔊  "${word}"`;
      btn.classList.add('flash');
      setTimeout(() => btn.classList.remove('flash'), 250);
    }

    // ── Onboarding steps ──────────────────────────────────────────────────
    const steps = [
      { title: "Welcome to the Core Board",
        desc:  "This is the most commonly used tool at our school. It helps our students to understand, make themselves understood, and learn that symbols have meaning. We point to symbols as we speak. Each symbol represents a word. Let's take a quick tour of how the board is organised.",
        hl: null },
      { title: "🟡 Yellow, Pronouns & People",
        desc:  "The yellow symbols are pronouns and people words: 'I / me / my', 'you / your', 'he / she', 'we / they / us'. These are helpful for modelling phrases such as 'your turn' when playing with students.",
        hl: 'yellow' },
      { title: "🩷 Pink, Questions & Social Words",
        desc:  "Pink symbols include question words like 'who', 'what', 'where', 'when', 'how', and 'why'. These help students learn to ask questions and actively participate.",
        hl: 'pink' },
      { title: "🟢 Green, Action Words (Verbs)",
        desc:  "Green symbols are action words or verbs like 'go', 'help', 'eat', 'play', and 'stop'. Action words are powerful words for our students to start using. We need to model them lots throughout the day.",
        hl: 'orange' },
      { title: "🟣 Purple, Location & Position Words",
        desc:  "Purple symbols are location and position words: 'here', 'there', 'in', 'out', 'up', 'down', 'on', 'off'. These describe where things are, or what the student is expected to do. For example 'go out' or 'put away'.",
        hl: 'purple' },
      { title: "🔵 Blue, Describing Words",
        desc:  "Blue symbols are descriptors, words like 'good', 'bad', 'big', 'hot', 'sad', 'different'. These give the students important information like 'finished', let them make choices or request 'more', or help them understand and share their feelings.",
        hl: 'blue' },
      { title: "Now Let's Find Some Words! 🔍",
        desc:  "Time to put your knowledge to the test! You'll be given 7 words one at a time. For each word, use the colour zones you've just learnt as your clue — then find and tap the word on the board.",
        hl: null },
    ];

    const dotsEl       = document.getElementById('ob-dots');
    const titleEl      = document.getElementById('ob-title');
    const descEl       = document.getElementById('ob-desc');
    const counterEl    = document.getElementById('ob-counter');
    const nextBtn      = document.getElementById('btn-next');
    const panel        = document.getElementById('ob-panel');
    const quizFeedback = document.getElementById('quiz-feedback');

    steps.forEach(() => {
      const d = document.createElement('div');
      d.className = 'dot';
      dotsEl.appendChild(d);
    });

    let step = 0;

    function showStep(i) {
      const s = steps[i];
      titleEl.textContent   = s.title;
      descEl.innerHTML      = s.desc;
      counterEl.textContent = `Step ${i + 1} of ${steps.length}`;
      nextBtn.textContent   = i === steps.length - 1 ? 'Start Activity →' : 'Next →';
      nextBtn.style.display = '';
      quizFeedback.style.display = 'none';
      document.querySelectorAll('.dot').forEach((d, idx) => d.classList.toggle('active', idx === i));
      document.querySelectorAll('.cell').forEach(btn =>
        btn.classList.toggle('highlighted', s.hl !== null && btn.dataset.cat === s.hl)
      );
    }

    nextBtn.addEventListener('click', () => {
      step++;
      if (step >= steps.length) {
        document.body.classList.remove('onboarding');
        document.querySelectorAll('.cell').forEach(b => b.classList.remove('highlighted'));
        startQuiz();
        return;
      }
      showStep(step);
    });

    // Panel collapse toggle
    const obPanel     = document.getElementById('ob-panel');
    const panelToggle = document.getElementById('panel-toggle');

    panelToggle.addEventListener('click', () => {
      const collapsed = obPanel.classList.toggle('collapsed');
      panelToggle.textContent = collapsed ? '▲' : '▼';
    });

    showStep(0);

    // ── Quiz activity ─────────────────────────────────────────────────────
    let quizActive = false;
    let quizIndex  = 0;
    let quizLocked = false; // prevent clicks during transition

    // zoneCat maps to the catMap key used for highlighting
    const quizWords = [
      { word: 'sit',    row: 5, col: 2, zoneCat: 'orange', zoneEmoji: '🟢', zoneName: 'green',  zoneDesc: 'an action word (verb)', example: 'Time to sit down' },
      { word: 'good',   row: 4, col: 7, zoneCat: 'blue',   zoneEmoji: '🔵', zoneName: 'blue',   zoneDesc: 'a describing word',     example: 'Good work!' },
      { word: 'you',    row: 2, col: 0, zoneCat: 'yellow', zoneEmoji: '🟡', zoneName: 'yellow', zoneDesc: 'a pronoun',             example: 'Do you want to go outside?' },
      { word: 'help',   row: 3, col: 3, zoneCat: 'orange', zoneEmoji: '🟢', zoneName: 'green',  zoneDesc: 'an action word (verb)', example: 'Do you need help?' },
      { word: 'out',    row: 5, col: 6, zoneCat: 'purple', zoneEmoji: '🟣', zoneName: 'purple', zoneDesc: 'a location word',       example: 'Let\'s go out' },
      { word: 'when',   row: 0, col: 5, zoneCat: 'pink',   zoneEmoji: '🩷', zoneName: 'pink',   zoneDesc: 'a question word',       example: 'When is lunchtime?' },
      { word: 'finish', row: 1, col: 9, zoneCat: 'blue',   zoneEmoji: '🔵', zoneName: 'blue',   zoneDesc: 'a describing word',     example: 'All finished!' },
    ];

    function startQuiz() {
      quizActive = true;
      quizIndex  = 0;
      quizLocked = false;
      document.body.classList.add('quiz');

      // Replace onboarding dots with quiz progress dots
      dotsEl.innerHTML = '';
      quizWords.forEach(() => {
        const d = document.createElement('div');
        d.className = 'dot';
        dotsEl.appendChild(d);
      });

      showQuizStep();
    }

    function showQuizStep() {
      quizLocked = false;
      quizFeedback.style.display = 'none';
      nextBtn.style.display = 'none';

      const qw = quizWords[quizIndex];
      counterEl.textContent = `Word ${quizIndex + 1} of ${quizWords.length}`;
      titleEl.textContent   = `Find "${qw.word}" on the board`;
      descEl.innerHTML      = `<strong>"${qw.word}"</strong> is ${qw.zoneDesc} — look in the ${qw.zoneEmoji}&nbsp;<strong>${qw.zoneName}</strong> zone and tap it!`;

      document.querySelectorAll('.dot').forEach((d, idx) => {
        d.classList.toggle('active', idx === quizIndex);
        d.classList.toggle('done',   idx < quizIndex);
      });

      // Highlight the zone so the user knows where to look
      document.querySelectorAll('.cell').forEach(btn =>
        btn.classList.toggle('highlighted', btn.dataset.cat === qw.zoneCat)
      );
    }

    function handleQuizClick(btn) {
      if (quizLocked) return;
      const qw = quizWords[quizIndex];

      if (parseInt(btn.dataset.row) === qw.row && parseInt(btn.dataset.col) === qw.col) {
        // ✅ Correct
        quizLocked = true;
        speak(qw.word, btn);
        btn.classList.add('correct-flash');

        document.querySelectorAll('.cell').forEach(b => b.classList.remove('highlighted'));

        quizFeedback.style.cssText =
          'display:block; background:#e8f5e9; color:#2e7d32; border:1px solid #a5d6a7;';
        quizFeedback.innerHTML = `✅ Correct! <strong>"${qw.word}"</strong> lives in the ${qw.zoneName} zone. You can use it to say: <em>"${qw.example}"</em>`;

        quizIndex++;
        setTimeout(() => {
          btn.classList.remove('correct-flash');
          if (quizIndex < quizWords.length) {
            showQuizStep();
          } else {
            endQuiz();
          }
        }, 1800);

      } else {
        // ❌ Wrong
        quizFeedback.style.cssText =
          'display:block; background:#fff3e0; color:#e65100; border:1px solid #ffcc80;';
        quizFeedback.textContent = `🤔 Not quite — try again! Look in the ${qw.zoneEmoji} ${qw.zoneName} zone.`;
        btn.classList.add('flash');
        setTimeout(() => btn.classList.remove('flash'), 300);
      }
    }

    function endQuiz() {
      quizActive = false;
      document.body.classList.remove('quiz');
      document.body.classList.add('free-play');
      document.querySelectorAll('.cell').forEach(b => {
        b.classList.remove('highlighted', 'correct-flash', 'flash');
      });

      // Show celebration in panel then hide it
      counterEl.textContent = '';
      dotsEl.innerHTML = '';
      titleEl.textContent = '🎉 Well done!';
      descEl.innerHTML = "You found all 7 words! You now know where each colour zone lives on the core board.<br><br>👉 Click any symbol to hear it spoken aloud — have a free explore!";
      nextBtn.textContent   = 'Start Exploring →';
      nextBtn.style.display = '';
      quizFeedback.style.display = 'none';

      nextBtn.addEventListener('click', function handler() {
        panel.style.display = 'none';
        if (speechBar) speechBar.textContent = 'Click any symbol to hear it spoken aloud.';
        nextBtn.removeEventListener('click', handler);
      }, { once: true });
    }
  </script>
</body>
</html>
