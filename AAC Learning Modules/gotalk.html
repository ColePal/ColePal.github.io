<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GO Talk Device — AAC Board</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0e2533;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 12px;
    }

    h1 { color: #fff; font-size: 1.1rem; }

    /* ── Board wrapper ─────────────────────────────────────────── */
    .board-wrap {
      position: relative;
      width: 100%;
      max-width: 860px;
    }

    .board-wrap img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
    }

    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* ── Cell buttons ──────────────────────────────────────────── */
    .cell {
      position: absolute;
      background: transparent;
      border: none;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.15s, opacity 0.3s;
      pointer-events: auto;
    }

    .cell:hover  { background: rgba(74,184,212,0.22); }
    .cell:active { background: rgba(74,184,212,0.45); }
    .cell.speaking { background: rgba(255,220,0,0.35); }

    /* ── Onboarding dim / highlight ────────────────────────────── */
    body.onboarding .cell { opacity: 0.12; pointer-events: none; }
    body.onboarding .cell.highlight {
      opacity: 1;
      pointer-events: auto;
      animation: glow 1.2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 0 6px 2px rgba(74,184,212,0.6); }
      to   { box-shadow: 0 0 18px 6px rgba(74,184,212,0.9); }
    }

    body.onboarding .board-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      border-radius: 8px;
      z-index: 1;
      pointer-events: none;
    }

    body.onboarding .cell.highlight { z-index: 2; }

    /* ── Onboarding panel ──────────────────────────────────────── */
    #ob-panel {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      border-radius: 14px;
      padding: 20px 24px;
      max-width: 480px;
      width: 92%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
      z-index: 200;
    }

    #ob-panel h2 { font-size: 1rem; margin-bottom: 8px; color: #0e2533; }
    #ob-panel p  { font-size: 0.88rem; color: #444; line-height: 1.55; margin-bottom: 16px; }

    .ob-footer { display: flex; align-items: center; justify-content: space-between; }
    .dots { display: flex; gap: 5px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; transition: background 0.2s; }
    .dot.active { background: #1a6b8a; }

    #ob-next {
      background: #1a6b8a;
      color: #fff;
      border: none;
      padding: 9px 22px;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
    }
    #ob-next:hover { background: #145566; }

    /* ── Speech bar ────────────────────────────────────────────── */
    #speech-bar { font-size: 0.9rem; color: #a0c4d0; min-height: 1.4em; text-align: center; }
  </style>
</head>
<body class="onboarding">

  <div class="board-wrap" id="board-wrap">
    <img src="gotalk.png" alt="GO Talk AAC Device" draggable="false">
    <div class="overlay" id="overlay"></div>
  </div>

  <!-- Onboarding panel -->
  <div id="ob-panel">
    <h2 id="ob-title">Welcome to GO Talk</h2>
    <p  id="ob-body"></p>
    <div class="ob-footer">
      <div class="dots" id="dots"></div>
      <button id="ob-next">Next →</button>
    </div>
  </div>

  <script>
    // ── Image dimensions ──────────────────────────────────────────
    const IW = 640, IH = 480;

    // ── Grid layout — 4 rows × 8 cols (GO Talk 32+) ──────────────
    // Pixel boundaries verified against 640×480 image
    const rows = [
      { top: 157/IH*100, h: 53/IH*100 },   // Row 0: y=157..210
      { top: 220/IH*100, h: 53/IH*100 },   // Row 1: y=220..273
      { top: 283/IH*100, h: 54/IH*100 },   // Row 2: y=283..337
      { top: 347/IH*100, h: 61/IH*100 },   // Row 3: y=347..408
    ];

    const cols = [
      { left:  31/IW*100, w: 68/IW*100 },  // Col 0
      { left: 101/IW*100, w: 69/IW*100 },  // Col 1
      { left: 172/IW*100, w: 69/IW*100 },  // Col 2
      { left: 242/IW*100, w: 70/IW*100 },  // Col 3
      { left: 314/IW*100, w: 69/IW*100 },  // Col 4
      { left: 384/IW*100, w: 69/IW*100 },  // Col 5
      { left: 454/IW*100, w: 69/IW*100 },  // Col 6
      { left: 524/IW*100, w: 70/IW*100 },  // Col 7
    ];

    // ── Vocabulary: 4 rows × 8 cols — read from GO Talk 32+ image ─
    const vocab = [
      ["Hello",  "please", "clean",  "go",     "hot drink", "jacket",     "sweater",    "person"   ],
      ["child",  "eat",    "drive",  "people", "water",     "books",      "berries",    "teen"     ],
      ["dog",    "gloves", "cup",    "hat",    "clock",     "lunch",      "read",       "calculator"],
      ["Let's",  "drink",  "messy",  "snack",  "salad",     "jewelry",    "man",        "Good-Bye" ],
    ];

    // ── Speech ───────────────────────────────────────────────────
    function speak(word) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(word);
      u.rate = 0.88;
      window.speechSynthesis.speak(u);
    }

    // ── Build grid ───────────────────────────────────────────────
    const overlay = document.getElementById('overlay');
    const allIds  = () => {
      const out = [];
      for (let r = 0; r < rows.length; r++)
        for (let c = 0; c < cols.length; c++) out.push(`r${r}c${c}`);
      return out;
    };
    const rowIds = r => cols.map((_, c) => `r${r}c${c}`);

    rows.forEach((row, ri) => {
      cols.forEach((col, ci) => {
        const word = vocab[ri][ci];
        const btn  = document.createElement('button');
        btn.className    = 'cell';
        btn.dataset.id   = `r${ri}c${ci}`;
        btn.title        = word;
        btn.style.top    = row.top.toFixed(3) + '%';
        btn.style.left   = col.left.toFixed(3) + '%';
        btn.style.width  = col.w.toFixed(3)    + '%';
        btn.style.height = row.h.toFixed(3)    + '%';
        btn.addEventListener('click', () => {
          speak(word);
          document.getElementById('speech-bar')?.textContent = `🔊 "${word}"`;
          btn.classList.add('speaking');
          setTimeout(() => btn.classList.remove('speaking'), 800);
        });
        overlay.appendChild(btn);
      });
    });

    // ── Onboarding steps ─────────────────────────────────────────
    const steps = [
      {
        title: "Welcome to GO Talk 32+",
        body:  "The <strong>GO Talk 32+</strong> is a dedicated AAC (Augmentative and Alternative Communication) <em>speech-generating device</em> — a standalone gadget built for simplicity and reliability in any environment: classroom, home, or clinic.",
        highlight: [],
      },
      {
        title: "📦 32-Button Grid",
        body:  "The board has <strong>32 buttons</strong> arranged in a 4&times;8 grid. Each button, when pressed, plays a spoken word or phrase. The layout is fixed — printed paper overlays label each button, and different overlays can swap in different vocabulary sets.",
        highlight: allIds(),
      },
      {
        title: "👋 Row 1 — Greetings &amp; Basics",
        body:  "The <strong>top row</strong> holds everyday starters: <em>Hello, please, clean, go, hot drink, jacket, sweater, person</em>. These cover greetings, requests, and common daily objects that come up throughout the day.",
        highlight: rowIds(0),
      },
      {
        title: "🍽️ Row 2 — People &amp; Food",
        body:  "The <strong>second row</strong> covers people and mealtimes: <em>child, eat, drive, people, water, books, berries, teen</em>. Core communication for daily routines — from meals to activities.",
        highlight: rowIds(1),
      },
      {
        title: "🐕 Row 3 — Objects &amp; Activities",
        body:  "The <strong>third row</strong> includes everyday objects and activities: <em>dog, gloves, cup, hat, clock, lunch, read, calculator</em>. These support conversations about daily tasks and the environment.",
        highlight: rowIds(2),
      },
      {
        title: "🥗 Row 4 — Actions &amp; Farewells",
        body:  "The <strong>bottom row</strong> rounds out the board: <em>Let&rsquo;s, drink, messy, snack, salad, jewelry, man, Good-Bye</em>. Social connectors like &ldquo;Let&rsquo;s&rdquo; help users initiate activities, while &ldquo;Good-Bye&rdquo; closes conversations naturally.",
        highlight: rowIds(3),
      },
      {
        title: "🔊 How to Use",
        body:  "Click any button on the board to hear it spoken aloud. In a real GO Talk device, pressing the cell triggers the built-in speaker. Try a few — notice how the layout groups related words for easy access.",
        highlight: allIds(),
      },
      {
        title: "🎉 You&rsquo;re Ready!",
        body:  "Now explore the full board. Click any cell to hear what it says. Staff can use this to understand what a GO Talk user is communicating when they press a button.",
        highlight: [],
        last: true,
      },
    ];

    const TOTAL = steps.length;

    // Build dots
    const dotsEl = document.getElementById('dots');
    for (let i = 0; i < TOTAL; i++) {
      const d = document.createElement('span');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      dotsEl.appendChild(d);
    }

    let step = 0;

    function showStep(s) {
      const st = steps[s];
      document.getElementById('ob-title').textContent = st.title;
      document.getElementById('ob-body').innerHTML   = st.body;
      document.getElementById('ob-next').textContent = st.last ? '🎉 Explore!' : 'Next →';

      dotsEl.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i === s);
      });

      document.querySelectorAll('.cell').forEach(btn => {
        btn.classList.toggle('highlight', st.highlight.includes(btn.dataset.id));
      });

      if (st.last) {
        setTimeout(() => {
          document.body.classList.remove('onboarding');
          document.getElementById('ob-panel').style.display = 'none';
          document.getElementById('speech-bar')?.textContent = 'Click any cell to hear it spoken aloud';
        }, 600);
      }
    }

    document.getElementById('ob-next').addEventListener('click', () => {
      step++;
      if (step < TOTAL) showStep(step);
    });

    showStep(0);
  </script>
</body>
</html>
