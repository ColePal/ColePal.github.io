<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Core Board – Asking Questions</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 12px;
    }

    h1 { color: #fff; font-size: 1.2rem; letter-spacing: 0.02em; }

    #board-wrap {
      position: relative;
      width: 100%;
      max-width: 960px;
      user-select: none;
    }

    #board-img {
      display: block;
      width: 100%;
      height: auto;
    }

    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* Dim layer sits at z-index 1 inside the overlay */
    #overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.65);
      pointer-events: none;
      z-index: 1;
    }

    /* Base cell */
    .cell {
      position: absolute;
      background: transparent;
      border: none;
      cursor: default;
      border-radius: 4px;
      padding: 0;
      pointer-events: none;
      /* no z-index = sits below the dim layer */
    }

    /*
      Highlighted cells:
      - z-index 2 puts them above the dim layer
      - backdrop-filter brightens the board content showing through them,
        counteracting the dark overlay beneath
    */
    .cell.task-hl {
      z-index: 2;
      pointer-events: auto;
      cursor: pointer;
      backdrop-filter: brightness(2.6);
      -webkit-backdrop-filter: brightness(2.6);
      animation: glow 1.5s ease-in-out infinite;
    }

    @keyframes glow {
      0%,100% {
        box-shadow: 0 0 0 3px rgba(255,255,255,0.95), 0 0 16px rgba(255,255,255,0.55);
        background: rgba(255,255,255,0.12);
      }
      50% {
        box-shadow: 0 0 0 6px rgba(255,255,255,0.35), 0 0 30px rgba(255,255,255,0.2);
        background: rgba(255,255,255,0.04);
      }
    }

    .cell.flash  { background: rgba(255,220,0,0.5) !important; }

    .cell.wrong-flash {
      animation: wrong 0.45s ease forwards !important;
    }
    @keyframes wrong {
      0%   { background: rgba(210,40,40,0.6); transform: translateX(0); }
      25%  { transform: translateX(-6px); }
      75%  { transform: translateX(6px); }
      100% { background: rgba(255,255,255,0.12); transform: translateX(0); }
    }

    /* ── Task panel ─────────────────────────────────── */
    #task-panel {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      border-radius: 14px;
      padding: 12px 20px 14px;
      max-width: 400px;
      width: 93%;
      box-shadow: 0 14px 44px rgba(0,0,0,0.6);
      z-index: 300;
      text-align: center;
    }

    #panel-toggle {
      position: absolute;
      top: 8px; right: 10px;
      background: none; border: none;
      font-size: 1rem; cursor: pointer;
      color: #aaa; line-height: 1;
      padding: 2px 4px;
    }
    #panel-toggle:hover { color: #555; }

    #panel-body { transition: all 0.2s ease; overflow: hidden; }
    #task-panel.collapsed #panel-body { display: none; }
    #task-panel.collapsed { padding: 10px 20px; }

    #task-counter { font-size: 0.72rem; color: #aaa; margin-bottom: 3px; letter-spacing: 0.05em; text-transform: uppercase; }

    #prog-wrap { width: 100%; height: 5px; background: #eee; border-radius: 3px; margin-bottom: 8px; }
    #prog-bar  { height: 5px; background: #1565C0; border-radius: 3px; transition: width 0.5s ease; width: 0%; }

    #task-panel h2 { font-size: 0.92rem; color: #111; margin-bottom: 4px; }
    #task-instr    { font-size: 0.82rem; color: #444; line-height: 1.45; margin-bottom: 8px; }

    #task-feedback {
      min-height: 1.2em;
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 6px;
      line-height: 1.4;
      transition: color 0.2s;
    }

    #btn-next {
      display: none;
      background: #1565C0; color: #fff; border: none;
      padding: 8px 24px; border-radius: 9px;
      font-size: 0.86rem; font-weight: 700; cursor: pointer;
      transition: background 0.15s;
    }
    #btn-next:hover  { background: #0D47A1; }
    #btn-next.show   { display: inline-block; }

    /* ── Reflection task extras ─────────────────────── */
    #reflection-area { display: none; margin-top: 4px; }

    #selected-word-display {
      font-size: 0.82rem;
      color: #777;
      margin-bottom: 10px;
      min-height: 1.4em;
      font-style: italic;
    }
    #selected-word-display.picked {
      color: #1565C0;
      font-style: normal;
      font-weight: 600;
    }

    #reflection-input {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.88rem;
      font-family: inherit;
      color: #222;
      resize: none;
      margin-bottom: 10px;
      transition: border-color 0.15s;
      line-height: 1.5;
    }
    #reflection-input:focus { outline: none; border-color: #1565C0; }

    #reflection-hint {
      font-size: 0.75rem;
      color: #aaa;
      margin-bottom: 10px;
      text-align: left;
    }

    #btn-submit-reflection {
      background: #1565C0; color: #fff; border: none;
      padding: 10px 26px; border-radius: 9px;
      font-size: 0.9rem; font-weight: 700; cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    #btn-submit-reflection:hover:not(:disabled) { background: #0D47A1; }
    #btn-submit-reflection:disabled { opacity: 0.35; cursor: default; }

    /* Selected WH word glows gold */
    .cell.task-hl-selected {
      animation: glow-selected 1.2s ease-in-out infinite !important;
    }
    @keyframes glow-selected {
      0%,100% { box-shadow: 0 0 0 3px rgba(255,210,0,0.95), 0 0 16px rgba(255,210,0,0.6); background: rgba(255,210,0,0.2); }
      50%      { box-shadow: 0 0 0 6px rgba(255,210,0,0.4),  0 0 30px rgba(255,210,0,0.25); background: rgba(255,210,0,0.07); }
    }

    /* ── Completion screen ──────────────────────────── */
    #done-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      z-index: 600;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
      padding: 32px;
      gap: 16px;
    }
    #done-screen.show { display: flex; }
    #done-screen h1  { font-size: 2rem; }
    #done-screen p   { font-size: 1rem; color: #bbb; max-width: 460px; line-height: 1.65; }
  </style>
</head>

<body>
  <div id="board-wrap">
    <img id="board-img" src="coreboard.png" alt="AAC 77 Symbol Core Board" draggable="false">
    <div id="overlay"></div>
  </div>

  <div id="task-panel">
    <button id="panel-toggle" title="Hide/show panel">▼</button>
    <div id="panel-body">
    <div id="task-counter"></div>
    <div id="prog-wrap"><div id="prog-bar"></div></div>
    <h2 id="task-title"></h2>
    <p  id="task-instr"></p>
    <div id="task-feedback"></div>

    <!-- Reflection task extras (question words task) -->
    <div id="reflection-area">
      <div id="selected-word-display">👆 Click one of the highlighted question words on the board to select it</div>
      <textarea id="reflection-input" rows="3" placeholder="e.g. 'What do you want?' or 'Where is it?'"></textarea>
      <p id="reflection-hint">Minimum 10 characters required.</p>
      <button id="btn-submit-reflection" disabled>Submit ✓</button>
    </div>

    <button id="btn-next">Next Task →</button>
    </div>
  </div>

  <div id="done-screen">
    <h1>🎉 Ka pai!</h1>
    <p>Great work making it through this set of tasks! Keep practising, the more you model on the core board, the more natural it becomes for you and your students.</p>
    <a href="../index.html" style="display:inline-block;margin-top:16px;background:#1565C0;color:#fff;text-decoration:none;padding:12px 28px;border-radius:10px;font-weight:700;font-size:0.95rem;">Back to all modules →</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <script>
    // ── Board geometry ────────────────────────────────────────────────────
    const IW = 1248, IH = 909, MAIN_H = 795, COLS = 11, ROWS = 7;
    const cellW = 100 / COLS;
    const cellH = (MAIN_H / IH) * (100 / ROWS);

    const grid = [
      ["I, me, my","it","who","what","am, is, are, be","when","be careful","all","some","that","this"],
      ["he, she","we, they, us","not, don't","come","do, does, did","again","now, it's time","how","why","finish, all done","problem"],
      ["you, your","drink","eat, taste","feel","get, got","late, later","ready","all gone","bad","big","clean"],
      ["give, gave","go","hear, listen","help","like","where","away","cold","different","dirty","fast"],
      ["look, see","make, made","open, close","play","put","here","there","good","happy","hot","little"],
      ["read","say, tell","sit","stand","stop","in","out","more","sad","same","sick, sore"],
      ["take","turn","wait","want","work","up","down","on","off","silly","slow"],
    ];

    const bottomRow = [
      { word:"yes",    x1:206,  x2:313  },
      { word:"one",    x1:324,  x2:434  },
      { word:"two",    x1:443,  x2:553  },
      { word:"three",  x1:562,  x2:672  },
      { word:"four",   x1:681,  x2:791  },
      { word:"five",   x1:800,  x2:911  },
      { word:"no",     x1:924,  x2:1030 },
      { word:"toilet", x1:1063, x2:1169 },
    ];

    // ── Tasks ─────────────────────────────────────────────────────────────
    const tasks = [
      {
        type:        "reflection",
        title:       "Task 1: Question Words",
        instruction: "Five question words are highlighted on the board.",
        highlight:   ["who", "what", "when", "how", "why"],
        successMsg:  "✅ Question words are some of the most powerful tools on the board, they open up conversation and show students their voice matters.",
      },
      {
        title:      "Task 2: Transition to Lunch",
        instruction:"You're moving students from circle time to the lunch table. Which word do you model to help them prepare?",
        highlight:  ["feel", "ready", "fast"],
        correct:    "ready",
        successMsg: "✅ 'Ready' helps students anticipate what's coming and feel calm, a go-to word for any routine transition.",
        wrongMsgs: {
          "feel": "💭 A great word, but it doesn't signal a transition. What tells a student it's almost time to move?",
          "fast": "⚠️ 'Fast' adds pressure and can make transitions stressful. Think about what helps students feel calm, try again!",
        },
      },
      {
        title:      "Task 3: Puzzle Time",
        instruction:"A student keeps guiding your hand to the puzzle pieces rather than attempting it themselves. Which word do you model to encourage them to have a go?",
        highlight:  ["you", "stop", "help"],
        correct:    "you",
        successMsg: "✅ 'You', as in 'your turn' or 'you do it', hands ownership back to the student and builds real confidence.",
        wrongMsgs: {
          "stop": "🚫 'Stop' shuts down engagement rather than building it. What would invite them to try?",
          "help": "💛 Well-meaning, but offering help can take the activity away from them. We want them to feel capable, try again!",
        },
      },
      {
        title:      "Task 4: Story Time",
        instruction:"You're reading with a student and they start looking around and shuffling, clear signs they're losing interest. What do you model?",
        highlight:  ["different", "hear", "sad"],
        correct:    "different",
        successMsg: "✅ 'Different' shows you've read their cue and are offering a choice, keeping the interaction positive and student-led.",
        wrongMsgs: {
          "hear":   "👂 When a student is losing interest, we don't need them to listen to the whole book. Asking them to comply and sustain attention longer can lead to frustration and disengagement. Let reading be short and sweet, so the student can learn that books are fun.",
          "sad":    "💙 We might feel sad that they don't want to continue, but we model from their perspective, not ours. They're not telling us they're sad. What might be more meaningful for them right now?",
        },
      },
      {
        title:      "Task 5: Group Activity",
        instruction:"A student keeps getting up and isn't responding to 'sit down' or other cues. What do you model to follow their lead and move things forward?",
        highlight:  ["finish", "open", "wait"],
        correct:    "finish",
        successMsg: "✅ The student is telling you they're finished. Model 'finish' to put language to their intention, then move them to a short break.",
        wrongMsgs: {
          "open":  "📖 Before introducing something new, acknowledge what the student is already communicating. What are they telling you?",
          "wait":  "⚠️ 'Wait' can dysregulate a student who's already signalling they're done. This is a moment to follow their lead, try again!",
        },
      },
    ];

    // ── Build overlay cells ───────────────────────────────────────────────
    const overlay  = document.getElementById('overlay');
    const allCells = [];

    function makeCell(displayWord, styleObj) {
      const btn = document.createElement('button');
      btn.className = 'cell';
      const key = displayWord.split(',')[0].trim().toLowerCase();
      btn.dataset.key = key;
      Object.assign(btn.style, styleObj);
      btn.setAttribute('aria-label', displayWord);
      btn.addEventListener('click', () => onCellClick(btn, key));
      allCells.push(btn);
      overlay.appendChild(btn);
    }

    grid.forEach((row, r) => row.forEach((word, c) => {
      makeCell(word, {
        left:   `${(c * cellW).toFixed(3)}%`,
        top:    `${(r * cellH).toFixed(3)}%`,
        width:  `${cellW.toFixed(3)}%`,
        height: `${cellH.toFixed(3)}%`,
      });
    }));

    const btmTop = `${(MAIN_H / IH * 100).toFixed(3)}%`;
    const btmH   = `${((IH - MAIN_H) / IH * 100).toFixed(3)}%`;
    bottomRow.forEach(({ word, x1, x2 }) => {
      makeCell(word, {
        left:   `${(x1 / IW * 100).toFixed(3)}%`,
        top:    btmTop,
        width:  `${((x2 - x1) / IW * 100).toFixed(3)}%`,
        height: btmH,
      });
    });

    // ── Speech ────────────────────────────────────────────────────────────
    const speakAs = { "hear": "listen" };

    function speak(word) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(speakAs[word] || word);
      u.rate = 1.1;
      window.speechSynthesis.speak(u);
    }

    // ── Task engine ───────────────────────────────────────────────────────
    let taskIdx      = 0;
    let answered     = false;
    let selectedWord = null;

    const elCounter            = document.getElementById('task-counter');
    const elProgBar            = document.getElementById('prog-bar');
    const elTitle              = document.getElementById('task-title');
    const elInstr              = document.getElementById('task-instr');
    const elFeedback           = document.getElementById('task-feedback');
    const btnNext              = document.getElementById('btn-next');
    const reflectionArea       = document.getElementById('reflection-area');
    const selectedWordDisplay  = document.getElementById('selected-word-display');
    const reflectionInput      = document.getElementById('reflection-input');
    const btnSubmit            = document.getElementById('btn-submit-reflection');

    function loadTask(i) {
      answered     = false;
      selectedWord = null;
      const t = tasks[i];

      elCounter.textContent  = `Task ${i + 1} of ${tasks.length}`;
      elProgBar.style.width  = `${(i / tasks.length) * 100}%`;
      elTitle.textContent    = t.title;
      elInstr.textContent    = t.instruction;
      elFeedback.textContent = '';
      btnNext.classList.remove('show');

      const isReflection = t.type === 'reflection';
      reflectionArea.style.display = isReflection ? 'block' : 'none';
      elFeedback.style.display     = isReflection ? 'none'  : 'block';
      if (isReflection) {
        selectedWordDisplay.textContent = '👆 Click one of the highlighted question words on the board to select it';
        selectedWordDisplay.classList.remove('picked');
        reflectionInput.value = '';
        btnSubmit.disabled    = true;
      }

      allCells.forEach(b => b.classList.remove('task-hl', 'task-hl-selected'));
      const hlSet = new Set(t.highlight.map(w => w.toLowerCase()));
      allCells.forEach(b => {
        if (hlSet.has(b.dataset.key)) b.classList.add('task-hl');
      });
      scheduleCollapse();
    }

    function updateSubmitBtn() {
      btnSubmit.disabled = !(selectedWord && reflectionInput.value.trim().length >= 10);
    }

    reflectionInput.addEventListener('input', updateSubmitBtn);

    btnSubmit.addEventListener('click', () => {
      if (!selectedWord || !reflectionInput.value.trim()) return;
      answered = true;
      btnSubmit.disabled = true;
      const t = tasks[taskIdx];
      elFeedback.style.display = 'block';
      elFeedback.style.color   = '#2e7d32';
      elFeedback.textContent   = t.successMsg;
      elProgBar.style.width    = `${((taskIdx + 1) / tasks.length) * 100}%`;
      btnNext.textContent      = taskIdx + 1 < tasks.length ? 'Next Task →' : 'Finish 🎉';
      btnNext.classList.add('show');
      fireConfetti();
    });

    function onCellClick(btn, key) {
      expandPanel();
      if (answered) return;
      speak(key);

      const t = tasks[taskIdx];

      if (t.type === 'reflection') {
        allCells.forEach(b => b.classList.remove('task-hl-selected'));
        btn.classList.add('task-hl-selected');
        selectedWord = key;
        selectedWordDisplay.textContent = `✏️ "${key}" selected, now write a question you could model with this word`;
        selectedWordDisplay.classList.add('picked');
        updateSubmitBtn();
        return;
      }

      if (key === t.correct.toLowerCase()) {
        answered = true;
        btn.classList.add('flash');
        setTimeout(() => btn.classList.remove('flash'), 300);

        elFeedback.style.color = '#2e7d32';
        elFeedback.textContent = t.successMsg;
        elProgBar.style.width  = `${((taskIdx + 1) / tasks.length) * 100}%`;
        btnNext.textContent    = taskIdx + 1 < tasks.length ? 'Next Task →' : 'Finish 🎉';
        btnNext.classList.add('show');
        fireConfetti();
      } else {
        const msg = (t.wrongMsgs && t.wrongMsgs[key]) || 'Not quite, have another look!';
        elFeedback.style.color = '#c62828';
        elFeedback.textContent = msg;
        btn.classList.add('wrong-flash');
        setTimeout(() => btn.classList.remove('wrong-flash'), 500);
      }
    }

    btnNext.addEventListener('click', () => {
      taskIdx++;
      if (taskIdx >= tasks.length) {
        document.getElementById('done-screen').classList.add('show');
        fireConfetti(); fireConfetti();
        return;
      }
      loadTask(taskIdx);
    }
    scheduleCollapse();

    function fireConfetti() {
      confetti({
        particleCount: 130,
        spread: 80,
        origin: { y: 0.55 },
        colors: ['#1565C0','#42A5F5','#FDD835','#66BB6A','#EF5350','#AB47BC','#FF7043'],
      });
    }

    // Panel collapse
    const taskPanel   = document.getElementById('task-panel');
    const panelToggle = document.getElementById('panel-toggle');
    let collapseTimer = null;

    function scheduleCollapse(ms) {
      clearTimeout(collapseTimer);
      collapseTimer = setTimeout(() => {
        taskPanel.classList.add('collapsed');
        panelToggle.textContent = '▲';
      }, ms || 4000);
    }

    function expandPanel() {
      clearTimeout(collapseTimer);
      taskPanel.classList.remove('collapsed');
      panelToggle.textContent = '▼';
    }

    panelToggle.addEventListener('click', () => {
      const collapsed = taskPanel.classList.toggle('collapsed');
      panelToggle.textContent = collapsed ? '▲' : '▼';
      if (!collapsed) clearTimeout(collapseTimer);
    });

    loadTask(0);
  </script>
</body>
</html>
