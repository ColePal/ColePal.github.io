<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PodBook</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 12px;
    }

    h1 { color: #fff; font-size: 1.2rem; letter-spacing: 0.02em; }

    #book-wrap {
      position: relative;
      width: 100%;
      max-width: 960px;
      user-select: none;
    }

    .page { display: none; position: relative; }
    .page.active { display: block; }

    .page-img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 6px;
    }

    .page-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    .cell {
      position: absolute;
      background: transparent;
      border: none;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.08s ease;
      padding: 0;
    }
    .cell:hover  { background: rgba(255,255,255,0.18); }
    .cell:active { background: rgba(255,255,0,0.30); }
    .cell.flash         { background: rgba(255,220,0,0.45); }
    .cell.correct-flash { background: rgba(76,175,80,0.55) !important;
                          box-shadow: 0 0 0 3px rgba(76,175,80,0.9); }

    /* ── Activity panel ──────────────────────────────────────────────── */
    #activity-panel {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      border-radius: 10px;
      padding: 7px 16px 10px;
      max-width: 500px;
      width: 92%;
      box-shadow: 0 8px 28px rgba(0,0,0,0.5);
      z-index: 300;
      text-align: center;
    }
    #activity-panel.panel-middle {
      bottom: auto;
      top: 50%;
      transform: translate(-50%, -50%);
    }
    #ap-toggle {
      position: absolute; top: 5px; right: 8px;
      background: none; border: none; font-size: 0.9rem;
      cursor: pointer; color: #aaa; padding: 2px 4px;
    }
    #ap-toggle:hover { color: #555; }
    #activity-panel.collapsed #ap-body { display: none; }
    #activity-panel.collapsed { padding: 6px 16px; }

    #ap-counter { font-size: 0.72rem; color: #999; margin-bottom: 4px; }
    #ap-dots { display: flex; gap: 5px; justify-content: center; margin-bottom: 6px; }
    .ap-dot { width: 7px; height: 7px; border-radius: 50%; background: #ddd; transition: background 0.2s; }
    .ap-dot.active { background: #1565C0; }
    .ap-dot.done   { background: #43A047; }

    #activity-panel h2 { font-size: 0.9rem; color: #111; margin-bottom: 4px; }
    #activity-panel p  { font-size: 0.78rem; color: #444; line-height: 1.4; margin-bottom: 7px; }

    #ap-found {
      display: flex; flex-wrap: wrap; gap: 4px;
      justify-content: center; margin-bottom: 6px; min-height: 1.4em;
    }
    .found-badge {
      background: #e8f5e9; color: #2e7d32;
      border: 1px solid #a5d6a7; border-radius: 20px;
      padding: 1px 8px; font-size: 0.72rem; font-weight: 600;
    }

    #ap-feedback {
      display: none; margin-bottom: 7px;
      font-size: 0.76rem; padding: 5px 10px;
      border-radius: 6px; font-weight: 600;
    }
    #ap-next {
      background: #1565C0; color: #fff; border: none;
      padding: 7px 22px; border-radius: 7px;
      font-size: 0.82rem; font-weight: 700; cursor: pointer;
      display: none;
    }
    #ap-next:hover { background: #0D47A1; }
    #ap-start {
      background: #43A047; color: #fff; border: none;
      padding: 7px 22px; border-radius: 7px;
      font-size: 0.82rem; font-weight: 700; cursor: pointer;
    }
    #ap-start:hover { background: #2E7D32; }

    #speech-bar { font-size: 0.9rem; color: #aaa; min-height: 1.4em; text-align: center; }
  </style>
</head>
<body>
  <h1>PodBook</h1>

  <div id="book-wrap">
    <div class="page active" id="page-1a">
      <img class="page-img" src="podbook/page-1a.png" alt="Page 1a" draggable="false">
      <div class="page-overlay" id="overlay-1a"></div>
    </div>
    <div class="page" id="page-1b">
      <img class="page-img" src="podbook/page-1b.png" alt="Page 1b" draggable="false">
      <div class="page-overlay" id="overlay-1b"></div>
    </div>
    <div class="page" id="page-2">
      <img class="page-img" src="podbook/page-2.png" alt="Page 2" draggable="false">
      <div class="page-overlay" id="overlay-2"></div>
    </div>
    <div class="page" id="page-c">
      <img class="page-img" src="podbook/page-c.png" alt="Categories" draggable="false">
      <div class="page-overlay" id="overlay-c"></div>
    </div>
  </div>

  <!-- Activity panel -->
  <div id="activity-panel">
    <button id="ap-toggle" title="Collapse">▼</button>
    <div id="ap-body">
      <div id="ap-counter"></div>
      <div id="ap-dots"></div>
      <h2 id="ap-title">Try to Say 🗣️</h2>
      <p  id="ap-desc">You'll be given 5 real-life scenarios. Navigate the PODD book and tap a symbol that would be relevant to say in each situation. There may be more than one right answer!<br><br>💡 <strong>Tip:</strong> tap the <strong>▼</strong> button in the corner to collapse this panel if it's in the way.</p>
      <div id="ap-found"></div>
      <div id="ap-feedback"></div>
      <button id="ap-start">Start Activity →</button>
      <button id="ap-next">Next Scenario →</button>
    </div>
  </div>

  <div id="speech-bar"></div>

  <script>
    // ── Grid layout (% of image size, consistent across all pages) ────────
    // 5 content columns + 1 nav column, 4 content rows + 1 blank bottom row
    const CELL_W   = 17.0;   // content cell width %
    const NAV_W    = 15.0;   // nav column width %
    const CELL_H   = 21.0;   // row height %
    const colLeft  = [0, 17, 34, 51, 68];              // left % per content col
    const NAV_LEFT = 85;
    const rowTop   = [0.5, 21.5, 42.5, 63.5];         // top % per row

    // ── Page content ──────────────────────────────────────────────────────
    // word: spoken text (first comma-segment used for TTS)
    // r / c: row / column index; c:'nav' for the nav column
    // nav: page id to navigate to on click (also speaks)
    const PAGES = {
      '1a': [
        // Row 0
        { word: 'I, me, my, mine',            r:0, c:0, spoken:'i' },
        { word: "not, don't, can't",           r:0, c:1 },
        { word: 'ready',                       r:0, c:2 },
        { word: 'more',                        r:0, c:3 },
        { word: 'more to say',                 r:0, c:4, nav:'2' },
        // Row 1
        { word: 'you, your, yours',            r:1, c:0 },
        { word: 'do, did, does',               r:1, c:1 },
        { word: 'hurry up',                    r:1, c:2 },
        { word: 'finish',                      r:1, c:3 },
        { word: "I think it's",                r:1, c:4 },
        // Row 2
        { word: 'uh oh, oh no',                r:2, c:0 },
        { word: 'want',                        r:2, c:1 },
        { word: 'stop, wait',                  r:2, c:2 },
        { word: "let's do something else",     r:2, c:3 },
        { word: 'please',                      r:2, c:4 },
        // Row 3
        { word: "I don't know",                r:3, c:0 },
        { word: 'see, look, watch',            r:3, c:1 },
        { word: 'help',                        r:3, c:2 },
        { word: 'excuse me',                   r:3, c:3 },
        { word: 'thank you',                   r:3, c:4 },
        // Nav column
        { word: 'go back to page 1',           r:0, c:'nav', nav:'1a' },
        { word: 'ooops',                       r:1, c:'nav' },
        { word: 'go to categories',            r:2, c:'nav', nav:'c' },
        { word: 'turn the page',               r:3, c:'nav', nav:'1b' },
      ],
      '1b': [
        // Row 0
        { word: "what's your name",            r:0, c:0 },
        { word: "I'm sorry",                   r:0, c:1 },
        { word: "don't touch",                 r:0, c:2 },
        { word: "I'm busy",                    r:0, c:3 },
        { word: 'I understand',                r:0, c:4 },
        // Row 1
        { word: "what's happening",            r:1, c:0 },
        { word: 'just joking',                 r:1, c:1 },
        { word: "that's mine",                 r:1, c:2 },
        { word: 'go away',                     r:1, c:3 },
        { word: "I don't understand",          r:1, c:4 },
        // Row 2  (col 1 is a blank instruction note — silent, no auditory feedback)
        { word: "what's next",                 r:2, c:0 },
        { word: 'add social phrases',          r:2, c:1, silent:true },
        { word: 'you have to share',           r:2, c:2 },
        { word: 'leave me alone',              r:2, c:3 },
        { word: 'I forgot',                    r:2, c:4 },
        // Row 3  (col 1 is blank — silent, no auditory feedback)
        { word: 'can I play',                  r:3, c:0 },
        { word: 'add social phrases',          r:3, c:1, silent:true },
        { word: 'I want to do what the others are doing', r:3, c:2 },
        { word: 'goodbye',                     r:3, c:3 },
        { word: 'I love you',                  r:3, c:4 },
        // Nav column
        { word: 'go back to page 1',           r:0, c:'nav', nav:'1a' },
        { word: 'ooops',                       r:1, c:'nav' },
        { word: 'go to categories',            r:2, c:'nav', nav:'c' },
        { word: 'go back to page 1a',          r:3, c:'nav', nav:'1a', spoken:'go back to page 1 A' },
      ],
      '2': [
        // Row 0
        { word: "it's time to",                r:0, c:0 },
        { word: "I'm asking a question",       r:0, c:1 },
        { word: 'I have an idea',              r:0, c:2 },
        { word: 'I want to do an activity',    r:0, c:3 },
        { word: "something's wrong",           r:0, c:4 },
        // Row 1
        { word: 'pack up',                     r:1, c:0 },
        { word: "I'm telling you something",   r:1, c:1 },
        { word: "let's pretend",               r:1, c:2 },
        { word: "let's go",                    r:1, c:3 },
        { word: "I think it's",                r:1, c:4 },
        // Row 2
        { word: 'please get my communicator',  r:2, c:0 },

        { word: 'I want to show you something',r:2, c:2 },
        { word: 'do something',                r:2, c:3 },
        { word: 'I like this',                 r:2, c:4 },
        // Row 3

        { word: 'remember when',               r:3, c:1 },
        { word: 'I have a secret',             r:3, c:2 },
        { word: 'do a group activity',         r:3, c:3 },
        { word: "I don't like this",           r:3, c:4 },
        // Nav column (no 4th nav button on page 2)
        { word: 'go back to page 1',           r:0, c:'nav', nav:'1a' },
        { word: 'ooops',                       r:1, c:'nav' },
        { word: 'go to categories',            r:2, c:'nav', nav:'c' },
        // r:3 nav is blank on page 2
      ],
      'c': [
        // Row 0
        { word: "it's already happened",       r:0, c:0 },
        { word: 'people',                      r:0, c:1 },
        { word: 'activities',                  r:0, c:2 },
        { word: 'clothes',                     r:0, c:3 },
        { word: 'insert name and symbol',      r:0, c:4, silent:true },
        // Row 1
        { word: "it's about now",              r:1, c:0 },
        { word: 'actions',                     r:1, c:1 },
        { word: 'places',                      r:1, c:2 },
        { word: 'things',                      r:1, c:3 },
        { word: 'transport',                   r:1, c:4 },
        // Row 2
        { word: "it's going to happen",        r:2, c:0 },
        { word: 'descriptions',                r:2, c:1 },
        { word: 'special event',               r:2, c:2 },
        { word: 'house, garden',               r:2, c:3 },
        { word: 'characters',                  r:2, c:4 },
        // Row 3
        { word: "it's always happening",       r:3, c:0 },
        { word: 'days and time',               r:3, c:1 },
        { word: 'health',                      r:3, c:2 },
        { word: 'food, drink',                 r:3, c:3 },
        { word: 'animals',                     r:3, c:4 },
        // Nav column
        { word: 'go back to page 1',           r:0, c:'nav', nav:'1a' },
        { word: 'ooops',                       r:1, c:'nav' },
        { word: "it's not in my book, I'll give you a hint", r:2, c:'nav' },
        { word: 'turn the page',               r:3, c:'nav' },
      ],
    };

    // ── Build overlay buttons ─────────────────────────────────────────────
    Object.entries(PAGES).forEach(([pageId, cells]) => {
      const overlay = document.getElementById('overlay-' + pageId);
      cells.forEach(cell => {
        const isNav = cell.c === 'nav';
        const btn   = document.createElement('button');
        btn.className = 'cell';
        btn.setAttribute('aria-label', cell.word);
        btn.style.left   = (isNav ? NAV_LEFT : colLeft[cell.c]) + '%';
        btn.style.top    = rowTop[cell.r] + '%';
        btn.style.width  = (isNav ? NAV_W   : CELL_W) + '%';
        btn.style.height = CELL_H + '%';

        const spoken = cell.spoken || cell.word.split(',')[0].trim();
        btn.addEventListener('click', () => {
          if (!cell.silent) speak(spoken, btn);
          if (cell.nav) setTimeout(() => goToPage(cell.nav), 200);
          if (activityActive && !cell.silent) handleActivityTap(cell, btn);
        });

        overlay.appendChild(btn);
      });
    });

    // ── Navigation ────────────────────────────────────────────────────────
    let currentPage = '1a';
    function goToPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + id).classList.add('active');
      currentPage = id;
    }

    // ── Speech ────────────────────────────────────────────────────────────
    const speechBar = document.getElementById('speech-bar');
    function speak(word, btn) {
      window.speechSynthesis.cancel();
      window.speechSynthesis.resume();
      const utt = new SpeechSynthesisUtterance(word);
      utt.rate = 0.88;
      window.speechSynthesis.speak(utt);
      if (speechBar) speechBar.textContent = `🔊  "${word}"`;
      btn.classList.add('flash');
      setTimeout(() => btn.classList.remove('flash'), 250);
    }

    // ── Scenarios ─────────────────────────────────────────────────────────
    const scenarios = [
      {
        title: 'Getting ready to read 📖',
        desc:  'You\'re about to read a story with a student. What might you model on the PODD book to help get them ready?',

        answers: [
          { page:'1a', r:0, c:0   },   // I, me, my, mine
          { page:'1a', r:0, c:2   },   // ready
          { page:'1a', r:0, c:3   },   // more
          { page:'1a', r:1, c:0   },   // you, your
          { page:'1a', r:1, c:1   },   // do, did, does
          { page:'1a', r:1, c:4   },   // I think it's
          { page:'1a', r:2, c:1   },   // want
          { page:'1a', r:2, c:2   },   // stop, wait
          { page:'1a', r:2, c:4   },   // please
          { page:'1a', r:3, c:1   },   // see, look, watch
          { page:'1a', r:3, c:2   },   // help
          { page:'1a', r:3, c:4   },   // thank you
          { page:'1a', r:3, c:'nav' }, // turn the page
          { page:'1b', r:2, c:0   },   // what's next
          { page:'2',  r:0, c:2   },   // I have an idea
          { page:'2',  r:0, c:3   },   // I want to do an activity
          { page:'2',  r:1, c:1   },   // I'm telling you something
          { page:'2',  r:1, c:2   },   // let's pretend
          { page:'2',  r:1, c:3   },   // let's go
          { page:'2',  r:2, c:1   },   // I'm telling a story
          { page:'2',  r:2, c:2   },   // I want to show you something
          { page:'2',  r:2, c:4   },   // I like this
          { page:'2',  r:3, c:1   },   // remember when
          { page:'c',  r:0, c:2   },   // activities
          { page:'c',  r:2, c:4   },   // characters
        ]
      },
      {
        title: 'A student seems upset 😟',
        desc:  'A student seems distressed but isn\'t communicating why. What might you model to help them express what\'s wrong?',
        answers: [
          { page:'1a', r:0, c:0   },   // I, me, my, mine
          { page:'1a', r:0, c:1   },   // not, don't, can't
          { page:'1a', r:1, c:0   },   // you — "are you okay?"
          { page:'1a', r:1, c:1   },   // do, did, does
          { page:'1a', r:1, c:3   },   // finish — "are you finished?"
          { page:'1a', r:2, c:0   },   // uh oh, oh no
          { page:'1a', r:2, c:1   },   // want
          { page:'1a', r:2, c:2   },   // stop, wait
          { page:'1a', r:2, c:3   },   // let's do something else
          { page:'1a', r:2, c:4   },   // please
          { page:'1a', r:3, c:0   },   // I don't know
          { page:'1a', r:3, c:1   },   // see, look, watch
          { page:'1a', r:3, c:2   },   // help
          { page:'1a', r:3, c:4   },   // thank you
          { page:'1b', r:0, c:1   },   // I'm sorry
          { page:'1b', r:0, c:2   },   // don't touch
          { page:'1b', r:0, c:4   },   // I understand
          { page:'1b', r:1, c:0   },   // what's happening
          { page:'1b', r:1, c:3   },   // go away
          { page:'1b', r:1, c:4   },   // I don't understand
          { page:'1b', r:2, c:3   },   // leave me alone
          { page:'2',  r:0, c:1   },   // I'm asking a question
          { page:'2',  r:0, c:2   },   // I have an idea
          { page:'2',  r:0, c:4   },   // something's wrong
          { page:'2',  r:1, c:1   },   // I'm telling you something
          { page:'2',  r:2, c:0   },   // please get my communicator
          { page:'2',  r:2, c:4   },   // I like this
          { page:'2',  r:3, c:4   },   // I don't like this
          { page:'c',  r:3, c:2   },   // health
        ]
      },
      {
        title: 'Transitioning to a frame 🚶',
        desc:  'You are supporting a student to move to their standing or walking frame. What might you model on the PODD book to prepare them?',
        answers: [
          { page:'1a', r:0, c:0   },   // I, me, my, mine
          { page:'1a', r:0, c:1   },   // not, don't, can't
          { page:'1a', r:0, c:2   },   // ready

          { page:'1a', r:1, c:0   },   // you — "you ready?"

          { page:'1a', r:3, c:2   },   // help
          { page:'1a', r:3, c:4   },   // thank you

      },
      {

        desc:  'The student is working on making choices between two options. How might you prepare them for the question using the PODD book?',
        answers: [
          { page:'1a', r:0, c:0   },   // I, me, my, mine

          { page:'1a', r:1, c:4   },   // I think it's
          { page:'1a', r:2, c:1   },   // want

      {
        title: 'Preparing for personal care 🤝',
        desc:  'You are about to support a student with personal care such as tube-feeding or a hoist transfer. What might you model to let them know what\'s happening?',

          { page:'1a', r:0, c:0   },   // I, me, my, mine
          { page:'1a', r:0, c:1   },   // not, don't, can't — consent/refusal
          { page:'1a', r:0, c:2   },   // ready
          { page:'1a', r:0, c:3   },   // more
          { page:'1a', r:1, c:0   },   // you — "you ready?"
          { page:'1a', r:1, c:1   },   // do, did, does
          { page:'1a', r:1, c:3   },   // finish — when it's done
          { page:'1a', r:2, c:0   },   // uh oh, oh no
          { page:'1a', r:2, c:1   },   // want
          { page:'1a', r:2, c:2   },   // stop, wait — safety word
          { page:'1a', r:2, c:3   },   // let's do something else
          { page:'1a', r:2, c:4   },   // please
          { page:'1a', r:3, c:1   },   // see, look, watch
          { page:'1a', r:3, c:2   },   // help
          { page:'1a', r:3, c:4   },   // thank you
          { page:'1b', r:0, c:2   },   // don't touch
          { page:'1b', r:0, c:4   },   // I understand
          { page:'1b', r:1, c:0   },   // what's happening
          { page:'1b', r:2, c:3   },   // leave me alone
          { page:'2',  r:0, c:0   },   // it's time to
          { page:'2',  r:0, c:1   },   // I'm asking a question
          { page:'2',  r:0, c:4   },   // something's wrong
          { page:'2',  r:1, c:1   },   // I'm telling you something
          { page:'2',  r:1, c:3   },   // let's go
          { page:'2',  r:2, c:0   },   // please get my communicator
          { page:'2',  r:2, c:3   },   // do something
          { page:'2',  r:2, c:4   },   // I like this
          { page:'2',  r:3, c:0   },   // I need to go to the toilet
          { page:'2',  r:3, c:4   },   // I don't like this
          { page:'c',  r:3, c:2   },   // health
        ]
      },
    ];

    // ── Activity state ────────────────────────────────────────────────────
    let activityActive = false;
    let scenarioIndex  = 0;
    let foundKeys      = [];

    // Panel elements
    const apPanel    = document.getElementById('activity-panel');
    const apToggle   = document.getElementById('ap-toggle');
    const apCounter  = document.getElementById('ap-counter');
    const apDots     = document.getElementById('ap-dots');
    const apTitle    = document.getElementById('ap-title');
    const apDesc     = document.getElementById('ap-desc');
    const apFound    = document.getElementById('ap-found');
    const apFeedback = document.getElementById('ap-feedback');
    const apNext     = document.getElementById('ap-next');
    const apStart    = document.getElementById('ap-start');

    // Build dots
    scenarios.forEach(() => {
      const d = document.createElement('div');
      d.className = 'ap-dot';
      apDots.appendChild(d);
    });

    apToggle.addEventListener('click', () => {
      const c = apPanel.classList.toggle('collapsed');
      apToggle.textContent = c ? '▲' : '▼';
    });

    apStart.addEventListener('click', () => {
      activityActive = true;
      scenarioIndex  = 0;
      showScenario();
    });

    apNext.addEventListener('click', () => {
      scenarioIndex++;
      if (scenarioIndex < scenarios.length) {
        showScenario();
      } else {
        endActivity();
      }
    });

    function showScenario() {
      foundKeys = [];
      const s = scenarios[scenarioIndex];
      apCounter.textContent = `Scenario ${scenarioIndex + 1} of ${scenarios.length}`;
      apTitle.textContent   = s.title;
      apDesc.textContent    = s.desc;
      apFound.innerHTML     = '';
      apFeedback.style.display = 'none';
      apNext.style.display  = 'none';
      apStart.style.display = 'none';
      document.querySelectorAll('.ap-dot').forEach((d, i) => {
        d.classList.toggle('active', i === scenarioIndex);
        d.classList.toggle('done',   i < scenarioIndex);
      });
      goToPage('1a');
      // Personal care scenario (last): move panel to centre so bottom row is accessible
      apPanel.classList.toggle('panel-middle', scenarioIndex === scenarios.length - 1);
    }

    function handleActivityTap(cell, btn) {
      const s   = scenarios[scenarioIndex];
      const key = `${currentPage}-${cell.r}-${String(cell.c)}`;

      // Nav buttons (more to say, turn the page, etc.) show a grey nudge but don't count
      if (cell.nav) {
        apFeedback.style.cssText = 'display:block; background:#f5f5f5; color:#555; border:1px solid #ccc;';
        apFeedback.textContent   = `➡️ Navigating to find more options — good thinking! Now tap something to say.`;
        const badge = document.createElement('span');
        badge.className   = 'found-badge';
        badge.style.cssText = 'background:#e0e0e0; color:#555; border-color:#bbb;';
        badge.textContent = `➡️ ${cell.word.split(',')[0].trim()}`;
        apFound.appendChild(badge);
        return;
      }

      const isAnswer = s.answers.some(a =>
        a.page === currentPage && a.r === cell.r && String(a.c) === String(cell.c)
      );

      if (isAnswer && !foundKeys.includes(key)) {
        foundKeys.push(key);
        const label = cell.word.split(',')[0].trim();
        const badge = document.createElement('span');
        badge.className   = 'found-badge';
        badge.textContent = `✅ ${label}`;
        apFound.appendChild(badge);
        btn.classList.add('correct-flash');
        setTimeout(() => btn.classList.remove('correct-flash'), 900);

        apFeedback.style.cssText = 'display:block; background:#e8f5e9; color:#2e7d32; border:1px solid #a5d6a7;';
        if (foundKeys.length === 1 && s.hint) {
          apFeedback.innerHTML = `✅ Great choice! "${label}" is a great thing to say here. Keep exploring!<br><span style="font-weight:normal;font-size:0.8em">${s.hint}</span>`;
        } else {
          apFeedback.textContent = `✅ Great choice! "${label}" — keep going, find ${3 - foundKeys.length} more!`;
        }
        apNext.style.display = '';

        if (foundKeys.length >= 3) {
          apFeedback.style.cssText = 'display:block; background:#e8f5e9; color:#2e7d32; border:1px solid #a5d6a7;';
          apFeedback.textContent = '🎉 Excellent! Moving to the next scenario…';
          apNext.style.display = 'none';
          setTimeout(() => {
            scenarioIndex++;
            if (scenarioIndex < scenarios.length) showScenario();
            else endActivity();
          }, 1800);
        }
      } else if (!isAnswer && cell.c !== 'nav' && !cell.nav) {
        apFeedback.style.cssText = 'display:block; background:#fff3e0; color:#e65100; border:1px solid #ffcc80;';
        apFeedback.textContent   = '🤔 That might not fit this situation — keep exploring the PODD book!';
      }
    }

    function endActivity() {
      activityActive = false;
      apCounter.textContent    = '';
      apFound.innerHTML        = '';
      apFeedback.style.display = 'none';
      apNext.style.display     = 'none';
      apTitle.textContent      = '🎉 Well done!';
      apDesc.textContent       = 'You\'ve completed all the scenarios! The more you explore the PODD book, the more natural modelling will feel for your students.';
      document.querySelectorAll('.ap-dot').forEach(d => { d.classList.remove('active'); d.classList.add('done'); });
    }

    // ── Debug: press D to toggle button outlines ─────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key === 'd' || e.key === 'D') document.body.classList.toggle('debug');
    });
  </script>
  <style>
    body.debug .cell {
      outline: 2px solid rgba(255,0,0,0.7);
      background: rgba(255,0,0,0.08) !important;
    }
  </style>
</body>
</html>
